echo "Loading Crosshair Settings..."    

// Crosshair commands.

// Crosshair style.
// Default: 0
//
// <> Values:
// 0: Default
// 1: Default static
// 2: Classic
// 3: Classic dynamic
// 4: Classic static
// 5: Legacy
cl_crosshairstyle 4

// Crosshair line length.
// Default: 5
//
// <-> Higher values make the crosshair longer.
cl_crosshairsize 1

// Crosshair line thickness.
// Default: 0.5
//
// <-> Higher values make the crosshair thicker.
cl_crosshairthickness 1

// Crosshair gap from the screen center.
// Default: 0
//
// <-> Lower values make the crosshair tighter.
cl_crosshairgap -2.5

// Show a dot in the middle of the crosshair.
// Default: 0
//
// <> Values:
// 0: Disabled
// 1: Enabled
cl_crosshairdot 0

// Use T-shaped crosshair by hiding the top line.
// Default: 0
//
// <> Values:
// 0: Disabled
// 1: Enabled
cl_crosshair_t 0

// Draw crosshair outline.
// Default: 1
//
// <> Values:
// 0: Disabled
// 1: Enabled
cl_crosshair_drawoutline 1

// Crosshair outline thickness.
// Default: 1
//
// <-> Used only when 'cl_crosshair_drawoutline' is enabled.
cl_crosshair_outlinethickness 0.1

// Use custom crosshair alpha.
// Default: 1
//
// <> Values:
// 0: Disabled
// 1: Enabled
cl_crosshairusealpha 1

// Crosshair opacity.
// Default: 200
//
// <-> 0 is fully transparent, 255 is fully visible.
cl_crosshairalpha 255

// Crosshair color preset.
// Default: 1
//
// <> Values:
// 0: Red
// 1: Green
// 2: Yellow
// 3: Blue
// 4: Cyan
// 5: Custom RGB
cl_crosshaircolor 5

// Custom crosshair red color channel.
// Default: 50
//
// <-> Used when 'cl_crosshaircolor' is set to 5.
cl_crosshaircolor_r 255

// Custom crosshair green color channel.
// Default: 250
//
// <-> Used when 'cl_crosshaircolor' is set to 5.
cl_crosshaircolor_g 255

// Custom crosshair blue color channel.
// Default: 50
//
// <-> Used when 'cl_crosshaircolor' is set to 5.
cl_crosshaircolor_b 255

// Dynamic crosshair split distance.
// Default: 7
//
// <-> Controls how far the dynamic crosshair splits while moving or shooting.
cl_crosshair_dynamic_splitdist 7

// Dynamic crosshair inner split alpha multiplier.
// Default: 1
//
// <-> Controls visibility of the inner split part.
cl_crosshair_dynamic_splitalpha_innermod 1

// Dynamic crosshair outer split alpha multiplier.
// Default: 0.5
//
// <-> Controls visibility of the outer split part.
cl_crosshair_dynamic_splitalpha_outermod 0.5

// Dynamic crosshair maximum split distance ratio.
// Default: 0.3
//
// <-> Controls how much of the dynamic split can be used at max spread.
cl_crosshair_dynamic_maxdist_splitratio 0.3                     

// Extras.

// Sniper crosshair line width.
// Default: 1
//
// <-> Higher values make scoped crosshair lines thicker.
cl_crosshair_sniper_width 1             

