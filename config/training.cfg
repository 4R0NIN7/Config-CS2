echo "Loading Training Settings..."     

// Ask the practice server to throw the last grenade again.
bind "F5" "say .rethrow"                

// Ask the practice server to clear active utility.
bind "F6" "say .clear"                  

// Ask the practice server to spawn or control a bot.
bind "F7" "say .bot"                    

// Ask the practice server to dismiss all spawned bots.
bind "F8" "say .dismissall"             

// Toggle noclip while practicing.
bind "ALT" "noclip"    

say ".cleanup"

