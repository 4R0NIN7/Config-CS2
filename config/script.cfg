echo "Loading Scripts..."               

// Audio effect aliases.
//
// <i> Used by binds and scripts as short sound feedback helpers.
alias blip_on "play sounds/buttons/blip1"      
alias blip_off "play sounds/buttons/blip2"     
alias button "play sounds/buttons/button9"     
alias select "play sounds/weapons/usp/usp_clipout"
alias invalid "play sounds/ui/menu_invalid"    
alias beep "play sounds/ui/beepclear"          
alias geiger "play sounds/player/geiger1"      
alias double_geiger "play sounds/player/geiger2"

// Use key with sound feedback.
alias +use-beep "+use; geiger"          
alias -use-beep "-use"                  

// Follow recoil crosshair toggle.
alias follow-crosshair "follow-crosshair_on"
alias follow-crosshair_on "cl_crosshair_recoil 1; alias follow-crosshair follow-crosshair_off"
alias follow-crosshair_off "cl_crosshair_recoil 0; alias follow-crosshair follow-crosshair_on"

// Shift volume aliases.
//
// <i> Temporarily raises volume while sprint is held and lowers it when released.
alias "+shh" "incrementvar volume 0 2 0.2; +sprint";
alias "-shh" "incrementvar volume 0 2 -0.2; -sprint";

// Quick switch aliases.
alias +quick-switch "slot3"             
alias -quick-switch "lastinv"           

// Scoreboard with FPS aliases.
alias +scores-fps "+showscores; cl_showfps 1"
alias -scores-fps "-showscores; cl_showfps 0"

// Bomb drop aliases.
alias "+bomb_drop" "slot3; slot5"       
alias "-bomb_drop" "drop; lastinv"      

// Shortcut aliases.
alias "dc" "disconnect"
alias "qt" "quit"
alias "rr" "retry"
alias "prac" "exec config/training.cfg"
alias "ae" "exec autoexec.cfg"
alias "vd" "volume 0.01"
alias "vu" "volume 0.85"        
