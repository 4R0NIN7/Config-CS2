echo "Loading Binds Settings..."        
// Remove all existing binds.
unbindall                               

// Updates game keyboard layout to the current Windows keyboard setting.
key_updatelayout                        

// Slot binds.

// Equip primary weapon.
bind "1"             "slot1"

// Equip secondary weapon.
bind "2"             "slot2"

// Equip knife, Zeus or fists.
bind "3"             "slot3"

// Equip grenades and cycle them.
bind "4"             "slot4"

// Equip C4 explosive or Medi-Shot.
bind "5"             "slot5"

// Equip High Explosive Grenade or Snowball.
bind "z"          	"slot6"

// Equip Flashbang.
bind "mouse4"       "slot7"

// Equip Smoke Grenade.
bind "mouse5"       "slot8"

// Equip Incendiary Grenade or Molotov.
bind "x"            "slot10"

// Movement binds.

// Strafe left.
bind "a"             "+left"

// Strafe right.
bind "d"             "+right"

// Move back.
bind "s"             "+back"

// Move forward.
bind "w"             "+forward"

// Control mouse yaw movement on the X axis.
bind "mouse_x"       "yaw"

// Control mouse pitch movement on the Y axis.
bind "mouse_y"       "pitch"

// Control analog movement on the X axis.
bind "x_axis"        "rightleft"

// Control analog movement on the Y axis.
bind "y_axis"        "!forwardback"

// Control analog yaw movement.
bind "u_axis"        "yaw"

// Control analog pitch movement.
bind "r_axis"        "pitch"

// Chat binds.

// Open team chat.
bind "u"             "messagemode2"

// Open all chat.
bind "y"             "messagemode"

// Radio binds.

// Report radio message.
// bind "z"             "radio1"

// Report radio message.
// bind "x"             "radio2"

// Open radial radio message menu 1.
bind "n"             "+radialradio1"

// Open radial radio message menu 2.
bind "m"             "+radialradio2"

// Open radial radio message menu 3.
bind ","             "+radialradio3"

// Other letter keys.

// Open the buy menu or tablet delivery.
bind "b"             "buymenu"

// Use objects with a beep sound.
bind "e"             "+use-beep"

// Inspect the weapon or lower the tablet.
bind "f"             "+lookatweapon"

// Drop the current weapon.
bind "g"             "drop"

// Open the spray menu.
bind "t"             "+spray_menu"

// Quick switch to knife or Zeus and back.
bind "q"             "+quick-switch"

// Reload the current weapon.
bind "r"             "+reload"

// Use voice chat.
bind "v"             "+voicerecord"

// Jump.
bind "space"              "+jump"

// Drop the bomb using the bomb drop alias.
bind "j"             "+bomb_drop"

// Temporarily change volume while walking.
bind "SHIFT"         "+shh"

// Special keys.

// Open or close the game menu.
bind "escape"        "cancelselect"

// Show the scoreboard with FPS while held.
bind "tab"           "+scores-fps"

// Walk silently.
bind "shift"         "+sprint"

// Duck or crouch.
bind "c"          	 "+duck"

// Jump.
bind "mwheeldown"    "+jump"

// Set volume to 0.85.
bind "pgup"          "volume 0.85"

// Mute the sound.
bind "pgdn"          "volume 0"

// Punctuation keys.

// Open the developer console.
bind "`"             "toggleconsole"

// Execute the training config.
bind "."             "exec config/training.cfg"

// Cursor control keys.

// Move forward.
bind "uparrow"       "+forward"

// Move back.
bind "downarrow"     "+back"

// Rotate left.
bind "leftarrow"     "+turnleft"

// Rotate right.
bind "rightarrow"    "+turnright"

// Mouse keys.

// Attack, plant, inject Medi-Shot, or cycle forward.
bind "mouse1"        "+attack"

// Zoom, alternate fire, toggle silencer, or cycle backward.
bind "mouse2"        "+attack2"

// Place a player ping.
bind "mouse3"        "player_ping"

// Toggle radar scale.
bind "capslock"          "toggleradarscale"

// Toggle follow recoil crosshair.
bind "kp_6"          "follow-crosshair"

// Numeric keypad keys.
//
// <!> Using the command 'buy <weapon>' results in the purchase of the gun that corresponds to the <weapon> in the default given loadout.
//
// <> Default loadout weapons list (up-bottom order):
// Equipment: vest, vesthelm, taser, defuser
// Pistols: hpk2000/usp_silencer/glock, elite, p250, fn57/tec9, deagle
// Mid-Tier: nova, xm1041, mp5sd, p90, mp9/mac10
// Rifles: famag/galilar, m4a1/m4a1_silencer/ak47, ssg08, aug/sg556, awp
// Grenades: flashbang, smokegrenade, hegrenade, incgrenade, decoy
//
// <> Entire weapons list:
// Pistols: glock, hkp2000, usp_silencer, elite, p250, tec9, fn57, deagle { (I) CZ75-Auto -> 'tec9', 'fn57'; (II) R8 Revolver -> 'deagle' }
// Rifles: galilar, famas, ak47, m4a1, m4a1_silencer, ssg08, aug, sg556, awp, scar20, g3sg1 { (I) M4A4, M4A1-S, AK-47 -> 'm4a1', 'm4a1_silencer', 'ak47' }
// Heavies: nova, xm1014, mag7, m249, negev { (I) Sawed-Off -> 'mag7' }
// SMGs: mac10, mp9, mp7, ump45, p90, bizon { (I) MP5-SD -> 'mp7' }
// Equipment: vest, vesthelm, taser, defuser, heavyarmor
// Grenades: molotov, incgrenade, decoy, flashbang, hegrenade, smokegrenade, tagrenade
//
// <i> An item which has a different name in the other team, can be bought via the other team-side alias.
// <i> After buying the items, the knife will be automatically equipped for an easier spawn run.

// Buy binds.

// Buy a smoke grenade and play confirmation sound.
bind "f1"            "buy smokegrenade; blip_on"

// Buy a flashbang and play confirmation sound.
bind "f2"            "buy flashbang; blip_off"

// Buy a high explosive grenade and play confirmation sound.
bind "f3"            "buy hegrenade; geiger"

// Buy a Molotov or incendiary grenade and play confirmation sound.
bind "f4"            "buy molotov; buy incgrenade; double_geiger"

// Sell back all possible purchases.
bind "/"             "sellbackall; invalid"

// Buy armor and helmet.
bind "leftarrow"     "buy vest; buy vesthelm; beep"

// Buy rifle depending on team loadout.
bind "uparrow"        "buy m4a4; buy ak47; blip_on"

// Buy defuse kit.
bind "downarrow"     "buy defuser; blip_off"

// Buy AWP.
bind "rightarrow"    "buy awp; select"

// Prevent buy wheel from purchasing via number keys.
// Default: 0
cl_buywheel_nonumberpurchasing "1"      

// Zoom button hold.
// Default: 1
//
// >> Holding the zoom button should heave as if it was pressed repetedly.
//
// <> Values:
// 0: Repetitive zoom.
// 1: One click.
cl_debounce_zoom "0"                    

// Detach silencer on supported weapons.
// Default: 0
//
// >> Removal of silencers on the M4A1-S and USP-S.
//
// <> Values:
// 0: Cannot detach.
// 1: Press secondary fire to detach.
cl_silencer_mode "0"                    

// Pressing the +use key will open the buy menu if in a buy zone (just as if the 'buy' key is pressed).
// Default: 1
cl_use_opens_buy_menu "0"               

// Name of the binding to enable mouse selection in the scoreboard.
// Default: +attack2
cl_scoreboard_mouse_enable_binding "+attack2"

// Set the key to use for donation in the buy menu.
// Default: 0
//
// <> Values:
// 0: Left Control.
// 1: Left Alt.
// 2: Left Shift.
cl_buywheel_donate_key "0"              

// Duck toggle.
// Default: 0
//
// <> Values:
// 0: Hold to duck.
// 1: Press to toggle duck.
option_duck_method "0"                  

// Walk toggle.
// Default: 0
//
// <> Values:
// 0: Hold to walk.
// 1: Press to toggle walk.
option_speed_method "0"                 

// When tapping the radial radio button, leave a ping if nothing is selected within the time in seconds set in 'cl_radial_menu_tap_duration'.
// Default: 1
cl_radial_radio_tap_to_ping "1"         

// Joystick controller support.
// Default: 0
joystick "0"                            

